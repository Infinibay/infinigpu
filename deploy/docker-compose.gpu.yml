# Infinibay — infinigpu virtual-GPU override (LINUX + NVIDIA host, on top of KVM)
#
# Composes ON TOP of the lxd dev stack's base + KVM overrides to give the backend
# container the three things the infinigpu render path needs: NVIDIA GPU access,
# a QEMU with the vfio-user-pci client, and the infinigpu-device server binary.
#
# Opt-in end to end: only VMs whose department has `gpuEnabled` get a virtual GPU,
# so this override is inert for every other VM.
#
# DON'T run this by hand — `iby up --gpu` composes it in (it uses podman-compose;
# a raw `docker compose` on this host delegates to legacy docker-compose v1, which
# can't parse these files). This file documents WHAT that override does.
#
# ── HOW THE ARTIFACTS ARE PROVIDED ───────────────────────────────────────────
# The vfio-user QEMU + the device server are built by the `infinigpu-builder`
# service (below) against the SAME base as the backend image (Debian bookworm,
# glibc 2.36) and published into the `infinigpu_build` volume, which the backend
# mounts read-only at /opt/qemu-vfio-user. A HOST build is the wrong ABI (host
# QEMU needs glibc ≥2.38; host-cargo device ≥2.39) and would not run in-container.
# `iby up --gpu` builds them automatically when the volume is empty (like it does
# for the infiniservice agent); `iby gpu build` does it on demand.
#
# ── HOST PREREQUISITE ────────────────────────────────────────────────────────
#  NVIDIA driver + nvidia-container-toolkit. `iby up --gpu` auto-generates the CDI
#  spec (sudo, with an explanation); or inspect it yourself:
#     iby gpu setup      #  ==  sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
#     iby gpu status     #  shows CDI + built-artifact readiness
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    devices:
      # Expose all NVIDIA GPUs via CDI (needs the toolkit + /etc/cdi spec above).
      # If your runtime doesn't do CDI, replace with explicit device nodes:
      #   - "/dev/dri:/dev/dri"
      #   - "/dev/nvidia0:/dev/nvidia0"
      #   - "/dev/nvidiactl:/dev/nvidiactl"
      #   - "/dev/nvidia-uvm:/dev/nvidia-uvm"
      # …and inject the NVIDIA userspace libs some other way (toolkit hook / mounts).
      - "nvidia.com/gpu=all"
    environment:
      # infinization invokes THIS QEMU (has the vfio-user-pci client) for ALL VMs;
      # it is a superset, so non-GPU VMs run on it identically.
      INFINIZATION_QEMU_BINARY: /opt/qemu-vfio-user/bin/qemu-system-x86_64
      # The device server infinization spawns per GPU VM (published into the volume).
      INFINIGPU_DEVICE_BIN: /opt/qemu-vfio-user/bin/infinigpu-device
      # Host VRAM the broker admits against (one A5000 ≈ 24564 MB; keep a reserve).
      INFINIGPU_HOST_VRAM_MB: ${INFINIGPU_HOST_VRAM_MB:-24000}
      INFINIGPU_HOST_VRAM_RESERVE_MB: ${INFINIGPU_HOST_VRAM_RESERVE_MB:-2000}
      # infiniPixel remote-display relay range (published below). The native
      # infinigpu viewer connects to ws://<host>:<one of these> (see gpuConsoleStream).
      INFINIPIXEL_PROXY_PORT_MIN: "6120"
      INFINIPIXEL_PROXY_PORT_MAX: "6139"
    ports:
      # Publish the infiniPixel relay so the viewer/browser can reach it off-host.
      # Honor PORT_BIND (loopback-only / pinned-NIC), matching the base compose.
      - "${PORT_BIND:-0.0.0.0}:6120-6139:6120-6139"
    volumes:
      # The container-native render artifacts (vfio-user QEMU + device binary +
      # its bundled lib closure), built by infinigpu-builder into this volume.
      - infinigpu_build:/opt/qemu-vfio-user:ro

  # Builds the vfio-user QEMU + infinigpu-device against the backend's ABI and
  # publishes them into infinigpu_build. NOT started by default (slow, GPU-only).
  # Driven by `iby up --gpu` (when the volume is empty) / `iby gpu build`.
  infinigpu-builder:
    profiles: ["builders"]
    build:
      context: ${REPOS_DIR:-./repos}/infinigpu
      dockerfile: deploy/Dockerfile.builder
    image: infinibay/dev-infinigpu-builder
    environment:
      # Where the backend serves guest artifacts from (infiniservice + gpu-driver).
      INFINIBAY_BASE_DIR: /opt/infinibay
    volumes:
      - ${REPOS_DIR:-./repos}/infinigpu:/src
      - infinigpu_build:/out
      - infinigpu_target:/target
      - infinigpu_cargo:/usr/local/cargo/registry
      # Shared with the backend — the builder stages the guest driver tarball here
      # (…/gpu-driver/linux/source.tar.gz) so the backend can serve it to GPU VMs.
      - infinibay_base:/opt/infinibay

volumes:
  infinigpu_build:
  infinigpu_target:
  infinigpu_cargo:
