PACKAGE_NAME="infinigpu"
PACKAGE_VERSION="0.1.0"
BUILT_MODULE_NAME[0]="infinigpu"
DEST_MODULE_LOCATION[0]="/updates/dkms"
# Reuse the out-of-tree Makefile (obj-m := infinigpu.o). DKMS copies the source to
# its build tree and passes the target kernel via KDIR, so the same Makefile that
# builds against the running kernel also builds for every DKMS-managed kernel.
MAKE[0]="make KDIR=${kernel_source_dir}"
CLEAN="make clean KDIR=${kernel_source_dir}"
# Rebuild automatically on every kernel upgrade / first boot after install.
AUTOINSTALL="yes"
