language = "C"
pragma_once = true
autogen_warning = "/* GENERATED by cbindgen from infinigpu-abi — do not edit. Regenerate: scripts/gen-abi-header.sh */"
style = "tag"
usize_is_size_t = true

# Only the fixed wire structs — their byte layout is the drift-risky contract.
# Register offsets and enum values live in infinigpu-abi::regs/wire and are simple
# integers (and would collide in C's flat namespace, e.g. DEV_MAGIC value vs. reg).
[export]
item_types = ["structs"]
# These constant names exist in two modules (value vs. register / message vs. ring
# bit); we don't emit constants anyway, so drop them to silence the C-namespace clash.
exclude = ["DEV_MAGIC", "RESET"]
include = [
  "Descriptor", "MsgHeader", "RingGeometry",
  "Negotiate", "CtxCreate", "ResourceCreateBlob", "MapBlob",
  "SubmitCmd", "Fence", "SetScanoutBlob", "ResourceFlush", "ClearPresent",
  "ScanoutPresent", "ScanoutPresentDamaged",
]

[parse]
parse_deps = false
